services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inventory-backend-api
    command: ["sh", "-c", "aerich upgrade && uv run inventory-api"]
    environment:
      DATABASE_URL: postgres://inventory:inventory@postgres:5432/inventory
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  backend-grpc:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inventory-backend-grpc
    command: ["sh", "-c", "aerich upgrade && uv run inventory-grpc"]
    environment:
      DATABASE_URL: postgres://inventory:inventory@postgres:5432/inventory
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  inventory_postgres_data:
